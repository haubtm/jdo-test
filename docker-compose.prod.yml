version: '3.8'

services:
  # Load Image trực tiếp từ GitHub Container Registry (không tự build)
  auth-service:
    image: ghcr.io/${GITHUB_USERNAME}/secure-vault-auth:latest
    env_file:
      - ./backend/.env
    environment:
      - TCP_HOST=0.0.0.0
    restart: always

  vault-service:
    image: ghcr.io/${GITHUB_USERNAME}/secure-vault-vault:latest
    env_file:
      - ./backend/.env
    environment:
      - TCP_HOST=0.0.0.0
    restart: always

  api-gateway:
    image: ghcr.io/${GITHUB_USERNAME}/secure-vault-gateway:latest
    env_file:
      - ./backend/.env
    environment:
      - AUTH_SERVICE_HOST=auth-service
      - VAULT_SERVICE_HOST=vault-service
    ports:
      - "3005:3000"
    depends_on:
      - auth-service
      - vault-service
    restart: always

# Khai báo network name của server bạn (nơi db `melodix-db` đang chạy)
networks:
  default:
    external: true
    name: melodix_default
